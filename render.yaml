services:
  - type: web
    name: dowon
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload
    envVars:
      - key: KSTARTUP_API_KEY
        value: 39af9bc6585e1db2baec17245fe6d556486148d45fe88aa213e10043604d343b
      - key: ADMIN_EMAIL
        value: admin@dowon.kr
      - key: ADMIN_PASSWORD
        value: dowon157600!
      - key: ADMIN_NAME
        value: 관리자
      - key: DB_PATH
        value: /tmp/dowon.db
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.4
