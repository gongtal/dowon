{% extends "auth_base.html" %}
{% block title %}로그인 · 도원결의{% endblock %}
{% block body %}
<form class="card" method="POST" autocomplete="on">
  <div class="brand">
    <div class="brand-mark">桃</div>
    <div>
      <div class="brand-name">도원결의</div>
      <div class="brand-sub">DOWON · 桃園結義</div>
    </div>
  </div>

  <div class="kicker">로그인</div>
  <h1>다시 만나 반갑습니다</h1>
  <p class="desc">승인된 계정으로 로그인하여 정부지원사업 공고를 확인하세요.</p>

  <label for="email">이메일</label>
  <input id="email" name="email" type="email" autocomplete="username" required autofocus placeholder="you@example.com" />

  <label for="pw">비밀번호</label>
  <input id="pw" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />

  <button type="submit">로그인</button>

  {% if error %}
    <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <div class="hint">
    계정 발급은 관리자에게 문의해주세요.<br/>
    <span style="color:var(--ink-300)">도원결의는 초대 전용 서비스입니다</span>
  </div>
</form>
{% endblock %}
